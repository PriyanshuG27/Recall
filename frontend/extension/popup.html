<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recall</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="header">
      <div class="logo-container">
        <div class="logo-icon">R</div>
        <span class="logo-text">Recall</span>
      </div>
    </header>

    <main class="content">
      <!-- Unauthenticated State -->
      <div id="auth-state-logged-out" class="state-container hidden">
        <p class="description">Save pages, PDFs, and articles directly to your Recall knowledge base.</p>
        <button id="btn-login" class="btn btn-login">
          <span>Login with Telegram</span>
        </button>
      </div>

      <!-- Authenticated State -->
      <div id="auth-state-logged-in" class="state-container hidden">
        <div class="page-info">
          <span class="label">Current Tab</span>
          <h4 id="tab-title" class="tab-title">Loading...</h4>
          <p id="tab-url" class="tab-url">Loading...</p>
        </div>
        
        <!-- Quote Card (Highlight Clip) -->
        <div id="quote-card-container" class="quote-card-container hidden">
          <div class="quote-header">
            <span class="label">Captured Quote</span>
            <button id="btn-clear-quote" class="clear-quote-btn" title="Clear Quote">×</button>
          </div>
          <p id="quote-text" class="quote-body"></p>
        </div>

        <!-- Custom Context Note Area -->
        <div class="context-container">
          <textarea id="context-note" placeholder="Write a context note..." rows="3"></textarea>
        </div>

        <!-- Suggested Tags Area -->
        <div id="tags-container" class="tags-container hidden">
          <span class="label">Suggested Tags</span>
          <div id="suggested-tags-list" class="suggested-tags-list"></div>
        </div>
        
        <button id="btn-save" class="btn btn-save">
          Save to Recall
        </button>
        
        <div id="status-message" class="status-message hidden"></div>
      </div>
    </main>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
