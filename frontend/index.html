<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="alternate icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Atrium">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>Atrium — Where knowledge finds its place</title>
    <meta name="description" content="A living knowledge space. Voice notes, PDFs, screenshots, links — extracted, connected, remembered. Privately.">
    <meta property="og:title" content="Atrium">
    <meta property="og:description" content="A place for everything you've learned.">
    <!-- Telegram Mini App SDK — must load first so window.Telegram.WebApp is available -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Performance Optimization: Preconnect & Font Preloads -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <style>
        body {
          background-color: #030307;
          margin: 0;
          font-family: system-ui, -apple-system, sans-serif;
        }
        .fallback-container {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 1.5rem;
        }
        .fallback-card-outer {
          width: 100%;
          max-width: 440px;
          padding: 6px;
          border-radius: 24px;
          background: rgba(255, 255, 255, 0.03);
          border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .fallback-card-inner {
          padding: 2.5rem 2rem;
          border-radius: 18px;
          background: rgba(7, 7, 15, 0.9);
          border: 1px solid rgba(255, 255, 255, 0.03);
          text-align: center;
        }
        .fallback-logo {
          font-size: 32px;
          font-weight: 700;
          color: #F1F1F6;
          margin: 0 0 0.5rem 0;
        }
        .fallback-tagline {
          font-size: 18px;
          color: #8E8E9F;
          margin: 0 0 2rem 0;
        }
        .fallback-pills {
          display: flex;
          gap: 0.6rem;
          margin-bottom: 2rem;
          justify-content: center;
        }
        .fallback-pill {
          padding: 0.4rem 0.8rem;
          border-radius: 20px;
          background: rgba(255, 255, 255, 0.04);
          border: 1px solid rgba(255, 255, 255, 0.08);
          font-size: 12px;
          color: #F1F1F6;
        }
        .fallback-widget {
          padding: 1.5rem;
          border: 1px solid #00D4AA;
          border-radius: 8px;
          background: rgba(0, 212, 170, 0.02);
          margin-bottom: 2rem;
        }
        .fallback-widget-title {
          font-size: 0.9rem;
          color: #F1F1F6;
          margin: 0 0 1rem 0;
        }
        .fallback-widget-btn {
          display: inline-block;
          background: #6C63FF;
          color: white;
          padding: 0.6rem 1.2rem;
          border-radius: 6px;
          text-decoration: none;
          font-weight: 600;
          font-size: 0.875rem;
        }
        .fallback-footer {
          font-size: 12px;
          color: #8E8E9F;
          margin: 0;
        }
      </style>
      <div class="fallback-container">
        <div class="fallback-card-outer">
          <div class="fallback-card-inner">
            <h1 class="fallback-logo" style="display: flex; align-items: center; justify-content: center; gap: 10px; font-family: 'DM Serif Display', Georgia, serif; font-weight: 400; font-size: 32px; color: #F4EFEB;">
              <svg viewBox="0 0 100 100" style="width: 32px; height: 32px; fill: #CFA365;" aria-hidden="true">
                <path d="M 25 85 V 50 A 25 25 0 0 1 75 50 V 85 H 63 V 50 A 13 13 0 0 0 37 50 V 85 Z" />
                <circle cx="50" cy="48" r="3.5" />
                <circle cx="43" cy="62" r="2.2" />
                <circle cx="57" cy="67" r="2.2" />
                <circle cx="47" cy="76" r="1.3" />
              </svg>
              Atrium
            </h1>
            <p class="fallback-tagline">A place for everything you've learned.</p>
            <div class="fallback-pills">
              <span class="fallback-pill">Voice Notes</span>
              <span class="fallback-pill">Links</span>
              <span class="fallback-pill">PDFs</span>
            </div>
            <div class="fallback-widget">
              <h3 class="fallback-widget-title">To log in without JavaScript, open our bot in Telegram:</h3>
              <a href="https://t.me/%VITE_BOT_USERNAME%" class="fallback-widget-btn" target="_blank" rel="noopener noreferrer">
                Open Bot &amp; Authorize
              </a>
            </div>
            <p class="fallback-footer">Free. No signup form. Works in &lt; 5 seconds.</p>
          </div>
        </div>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
