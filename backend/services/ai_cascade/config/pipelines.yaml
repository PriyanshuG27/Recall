    schema: "generate_context_question.json"
    providers:
      - groq
      - gemini
  joint_summary:
    cache: true
    validator: "JointSummaryValidator"
    schema: "joint_summary.json"
    providers:
      - groq
      - gemini
  graph:
    cache: true
