      - groq
      - nvidia
      - gemini
      - openrouter
  ocr:
    cache: true
    validator: "OCRValidator"
    schema: "ocr.json"
    providers:
      - gemini
      - nvidia
  insight:
    cache: true
    validator: "InsightValidator"
    schema: "insight.json"
    providers:
      - nvidia
      - cerebras
      - gemini
      - openrouter
  transcription:
    cache: true
    validator: "TranscriptionValidator"
    schema: "transcription.json"
